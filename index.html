<!DOCTYPE HTML>
<html>
	<head>
		<title>Charlie Price Creative</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

		<style>
			/* 1. Flawless Square CSS Grid & Smooth Cross-Fade Animation */
			#thumbnails {
				display: grid !important;
				grid-template-columns: repeat(2, 1fr) !important; 
				gap: 0 !important;
				transition: opacity 0.3s ease-in-out !important;
				opacity: 1;
			}
			#thumbnails article {
				width: 100% !important;
				height: auto !important;
				position: relative !important;
				top: 0 !important;
				left: 0 !important;
				transform: none !important;
			}
			#thumbnails article .thumbnail {
				width: 100% !important;
				aspect-ratio: 1 / 1 !important;
				display: block;
			}
			#thumbnails article .thumbnail img {
				width: 100% !important;
				height: 100% !important;
				object-fit: cover !important; 
			}

			/* 2. The Blurred Cinematic Viewer */
			#viewer .slide .image {
				background-size: cover !important;
				background-position: center !important;
				position: relative;
			}
			#viewer .slide .image::before {
				content: "";
				position: absolute;
				top: 0; left: 0; width: 100%; height: 100%;
				backdrop-filter: blur(40px);
				-webkit-backdrop-filter: blur(40px); 
				background: rgba(0, 0, 0, 0.65); 
				z-index: 1;
			}
			#viewer .slide .image::after {
				content: "";
				position: absolute;
				top: 0; left: 0; width: 100%; height: 100%;
				background-image: inherit; 
				background-size: contain !important; 
				background-repeat: no-repeat !important;
				background-position: center !important;
				z-index: 2;
			}

			/* 3. Main Navigation Styling */
			.main-categories {
				font-size: 1.25em;
				font-weight: normal;
				margin: 1em 0;
			}
			.main-categories a {
				color: #a0a0a1; /* Subtle grey for inactive tabs */
				border-bottom: none;
				text-decoration: none;
				transition: color 0.2s ease;
			}
			.main-categories a:hover {
				color: #333; /* Darkens slightly on hover */
			}
			.main-categories span {
				margin: 0 0.5em;
				color: #a0a0a1;
				opacity: 0.5;
			}
		</style>
	</head>
	<body class="is-preload-0 is-preload-1 is-preload-2">
		<div id="main">

			<header id="header">
				<h1>Charlie Price</h1>
				<p style="margin-bottom: 0.5em;">Based on the Isle of Wight, UK</p>
				
				<div class="main-categories">
					<a href="#" id="link-nav-photo" onclick="switchMain(event, 'nav-photo', 'tab-real-estate')" style="font-weight: bold; text-decoration: underline; color: #333;">Photography</a> <span>/</span>
					<a href="#" id="link-nav-video" onclick="switchMain(event, 'nav-video', 'tab-commercial-video')">Videography</a> <span>/</span>
					<a href="#" id="link-nav-design" onclick="switchMain(event, 'nav-design', 'tab-web-design')">Design</a>
				</div>

				<nav id="nav-photo" class="sub-nav" style="margin: 2em 0;">
					<ul style="list-style: none; padding: 0; margin: 0; line-height: 2;">
						<li><a href="#" onclick="switchTab(event, 'tab-real-estate', this)" style="font-weight: bold; border-bottom: none;">Real Estate</a></li>
						<li><a href="#" onclick="switchTab(event, 'tab-travel', this)" style="border-bottom: none;">Travel & Lifestyle</a></li>
						<li><a href="#" onclick="switchTab(event, 'tab-theatre', this)" style="border-bottom: none;">Film & Theatre</a></li>
					</ul>
				</nav>

				<nav id="nav-video" class="sub-nav" style="margin: 2em 0; display: none;">
					<ul style="list-style: none; padding: 0; margin: 0; line-height: 2;">
						<li><a href="#" onclick="switchTab(event, 'tab-commercial-video', this)" style="font-weight: bold; border-bottom: none;">Commercial</a></li>
						<li><a href="#" onclick="switchTab(event, 'tab-events-video', this)" style="border-bottom: none;">Events</a></li>
					</ul>
				</nav>

				<nav id="nav-design" class="sub-nav" style="margin: 2em 0; display: none;">
					<ul style="list-style: none; padding: 0; margin: 0; line-height: 2;">
						<li><a href="#" onclick="switchTab(event, 'tab-web-design', this)" style="font-weight: bold; border-bottom: none;">Web Design</a></li>
						<li><a href="#" onclick="switchTab(event, 'tab-branding', this)" style="border-bottom: none;">Branding</a></li>
					</ul>
				</nav>

				<ul class="icons">
					<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
					<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
				</ul>
			</header>

			<section id="thumbnails"></section>

			<footer id="footer">
				<ul class="copyright">
					<li>&copy; Charlie Price.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a>.</li>
				</ul>
			</footer>

		</div>

		<script src="data.js"></script>

		<script>
			const gallery = document.getElementById("thumbnails");

			function buildGroup(dataArray, folder, categoryClass) {
				if (!dataArray || dataArray.length === 0) return "";
				let html = "";
				dataArray.forEach(img => {
					html += `
					<article class="portfolio-item ${categoryClass}" style="display: none;">
						<a class="thumbnail" href="images/${folder}/fulls/${img.file}">
							<img src="images/${folder}/thumbs/${img.file}" alt="" loading="lazy" />
						</a>
						<h2></h2><p></p>
					</article>`;
				});
				return html;
			}

			// Instantly load ALL categories safely (checks if the arrays exist first)
			gallery.innerHTML = 
				// Photography
				buildGroup((typeof realEstateImages !== 'undefined' ? realEstateImages : null), 'real-estate', 'tab-real-estate') +
				buildGroup((typeof travelImages !== 'undefined' ? travelImages : null), 'travel', 'tab-travel') +
				buildGroup((typeof theatreImages !== 'undefined' ? theatreImages : null), 'theatre', 'tab-theatre') +
				// Videography (Placeholders)
				buildGroup((typeof commercialVideoImages !== 'undefined' ? commercialVideoImages : null), 'commercial-video', 'tab-commercial-video') +
				buildGroup((typeof eventsVideoImages !== 'undefined' ? eventsVideoImages : null), 'events-video', 'tab-events-video') +
				// Design (Placeholders)
				buildGroup((typeof webDesignImages !== 'undefined' ? webDesignImages : null), 'web-design', 'tab-web-design') +
				buildGroup((typeof brandingImages !== 'undefined' ? brandingImages : null), 'branding', 'tab-branding');

			// Turn on the Real Estate tab by default on first load
			document.querySelectorAll('.tab-real-estate').forEach(item => item.style.display = 'block');

			// ENGINE 1: Switching Main Categories (Photo / Video / Design)
			function switchMain(e, navId, defaultTabClass) {
				if(e) e.preventDefault();

				// Reset main links styling
				document.querySelectorAll('.main-categories a').forEach(a => {
					a.style.fontWeight = 'normal';
					a.style.textDecoration = 'none';
					a.style.color = '#a0a0a1'; // Return to grey
				});
				const activeLink = document.getElementById('link-' + navId);
				activeLink.style.fontWeight = 'bold';
				activeLink.style.textDecoration = 'underline';
				activeLink.style.color = '#333'; // Dark text for the active tab

				// Hide all sub-menus, then show the correct one
				document.querySelectorAll('.sub-nav').forEach(nav => nav.style.display = 'none');
				const activeNav = document.getElementById(navId);
				activeNav.style.display = 'block';

				// Automatically trigger the first sub-tab of the new menu
				const firstSubLink = activeNav.querySelector('a');
				switchTab(null, defaultTabClass, firstSubLink);
			}

			// ENGINE 2: Switching Sub Categories (Real Estate / Travel / etc.)
			function switchTab(e, tabClass, linkEl) {
				if(e) e.preventDefault(); 

				// Swap the bold text on the current active sub-menu
				const parentNav = linkEl.closest('.sub-nav');
				parentNav.querySelectorAll('a').forEach(a => a.style.fontWeight = 'normal');
				linkEl.style.fontWeight = 'bold';

				// Fade the grid to black
				gallery.style.opacity = 0;

				// Wait 300ms, swap the photos, and fade back in
				setTimeout(() => {
					document.querySelectorAll('.portfolio-item').forEach(item => {
						item.style.display = 'none';
					});
					
					document.querySelectorAll('.' + tabClass).forEach(item => {
						item.style.display = 'block';
					});
					
					gallery.style.opacity = 1;
				}, 300);
			}
		</script>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>

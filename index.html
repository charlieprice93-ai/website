<!DOCTYPE HTML>
<html>
	<head>
		<title>Charlie Price Creative</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
<style>
			/* 1. Flawless Square CSS Grid */
			/* Smooth Cross-Fade Animation */
			#thumbnails {
				transition: opacity 0.3s ease-in-out !important;
				opacity: 1;
			}
			#thumbnails {
				display: grid !important;
				grid-template-columns: repeat(2, 1fr) !important; /* This forces exactly 2 columns! */
				gap: 0 !important;
			}
			#thumbnails article {
				width: 100% !important;
				height: auto !important;
				position: relative !important;
				top: 0 !important;
				left: 0 !important;
				transform: none !important;
			}
			#thumbnails article .thumbnail {
				width: 100% !important;
				aspect-ratio: 1 / 1 !important;
				display: block;
			}
			#thumbnails article .thumbnail img {
				width: 100% !important;
				height: 100% !important;
				object-fit: cover !important; 
			}

			/* 2. The Blurred Cinematic Viewer */
			#viewer .slide {
				background-size: cover !important;
				background-position: center !important;
				position: relative;
			}
			#viewer .slide::before {
				content: "";
				position: absolute;
				top: 0; left: 0; width: 100%; height: 100%;
				backdrop-filter: blur(40px);
				-webkit-backdrop-filter: blur(40px); 
				background: rgba(0, 0, 0, 0.65); 
				z-index: 1;
			}
			#viewer .slide::after {
				content: "";
				position: absolute;
				top: 0; left: 0; width: 100%; height: 100%;
				background-image: inherit; 
				background-size: contain !important;
				background-repeat: no-repeat !important;
				background-position: center !important;
				z-index: 2;
			}
		</style>	</head>
	<body class="is-preload-0 is-preload-1 is-preload-2">
		<div id="main">

			<header id="header">
				<h1>Charlie Price</h1>
				<h3>Photography, Videography & Design</h3>
				<p>Based on the Isle of Wight, UK</p>
				<nav style="margin: 2em 0;">
					<ul style="list-style: none; padding: 0; margin: 0; line-height: 2;">
						<li><a href="#" onclick="switchTab('tab-real-estate', this)" style="font-weight: bold; border-bottom: none;">Real Estate</a></li>
						<li><a href="#" onclick="switchTab('tab-travel', this)" style="border-bottom: none;">Travel & Lifestyle</a></li>
						<li><a href="#" onclick="switchTab('tab-video', this)" style="border-bottom: none;">Videography</a></li>
						<li><a href="#" onclick="switchTab('tab-theatre', this)" style="border-bottom: none;">Film & Theatre</a></li>
					</ul>
				</nav>
				<ul class="icons">
					<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
					<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
				</ul>
			</header>

			<section id="thumbnails"></section>

			<footer id="footer">
				<ul class="copyright">
					<li>&copy; Charlie Price.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a>.</li>
				</ul>
			</footer>

		</div>
<script src="data.js"></script>

		<script>
			const gallery = document.getElementById("thumbnails");

			// This helper builds the invisible "buckets" for each category
			function buildGroup(dataArray, folder, id) {
				if (typeof dataArray === 'undefined') return "";
				
				// We start with display: none so they are hidden in the background
				let html = `<div id="${id}" class="portfolio-group" style="display: none;">`;
				dataArray.forEach(img => {
					html += `
					<article>
						<a class="thumbnail" href="images/${folder}/fulls/${img.file}">
							<img src="images/${folder}/thumbs/${img.file}" alt="" loading="lazy" />
						</a>
						<h2></h2><p></p>
					</article>`;
				});
				html += `</div>`;
				return html;
			}

			// Instantly load ALL categories into the DOM on page load
			gallery.innerHTML = 
				buildGroup(realEstateImages, 'real-estate', 'tab-real-estate') +
				buildGroup(travelImages, 'travel', 'tab-travel') +
				buildGroup(videoImages, 'video', 'tab-video') +
				buildGroup(theatreImages, 'theatre', 'tab-theatre');

			// Turn on the Real Estate tab by default
			document.getElementById('tab-real-estate').style.display = 'contents';

			// The Seamless Transition Engine
			function switchTab(tabId, linkEl) {
				if(event) event.preventDefault(); // Stops the page from jumping to the top

				// 1. Swap the bold text on the menu
				document.querySelectorAll('nav a').forEach(a => a.style.fontWeight = 'normal');
				linkEl.style.fontWeight = 'bold';

				// 2. Fade the grid to black
				gallery.style.opacity = 0;

				// 3. Wait exactly 300ms (for the fade to finish), swap the photos, and fade back in
				setTimeout(() => {
					// Hide all buckets
					document.querySelectorAll('.portfolio-group').forEach(group => {
						group.style.display = 'none';
					});
					
					// Turn on the chosen bucket
					document.getElementById(tabId).style.display = 'contents';
					
					// Fade back in
					gallery.style.opacity = 1;
				}, 300);
			}
		</script>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>

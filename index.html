		<style>
/* 🚀 The Batcave Dense Grid (Main Window Overlay) */
			#thumbnails.batcave-grid {
				position: fixed !important;
				top: 0 !important;
				left: 0 !important;
				width: 100vw !important; /* Stretches across the whole screen */
				height: 100vh !important;
				z-index: -1 !important; /* Sits perfectly behind the white right-hand sidebar */
				display: grid !important;
				grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important; 
				grid-auto-flow: dense !important; 
				gap: 0 !important; /* 🚀 FIX: Removes heavy borders, makes images sit flush */
				padding: 0 !important;
				margin: 0 !important;
				background: transparent !important; 
				overflow: hidden !important; /* Static wall, no scrolling */
			}
			
			#thumbnails.batcave-grid article {
				width: 100% !important;
				height: 100% !important;
				position: relative !important;
				top: 0 !important; left: 0 !important; transform: none !important;
				margin: 0 !important; 
				padding: 0 !important;
				border: none !important;
				overflow: hidden;
			}
			
			/* Makes landscape images take up twice the space */
			.span-2 { grid-column: span 2; grid-row: span 2; }
			
			#thumbnails.batcave-grid article .thumbnail, 
			#thumbnails.batcave-grid article .media-trigger {
				width: 100% !important;
				height: 100% !important;
				display: block;
				cursor: pointer;
				position: relative;
				margin: 0 !important;
			}
			#thumbnails.batcave-grid article img {
				width: 100% !important;
				height: 100% !important;
				object-fit: cover !important; 
				transition: opacity 1s ease;
			}

			/* 🚀 The Auto-Play YouTube Feed styling */
			.batcave-feed {
				position: absolute;
				top: -10%; left: -10%; 
				width: 120%; height: 120%;
				opacity: 0;
				pointer-events: none; 
				transition: opacity 1.5s ease;
				z-index: 1;
			}
			.batcave-feed.playing { opacity: 1; }
			
			.play-button {
				position: absolute;
				top: 50%; left: 50%;
				transform: translate(-50%, -50%);
				color: white;
				font-size: 3em;
				text-shadow: 0px 4px 15px rgba(0,0,0,0.8);
				opacity: 0.8;
				transition: opacity 0.2s;
				pointer-events: none;
				z-index: 2;
			}
			.media-trigger:hover .play-button { opacity: 1; }	/* 2. The Blurred Cinematic Viewer (For Photos) */
			#viewer .slide .image {
				background-size: cover !important;
				background-position: center !important;
				position: relative;
			}
			#viewer .slide .image::before {
				content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
				backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); 
				/* 🚀 THE FIX: Changed from black (0,0,0) to white (255,255,255) */
				background: rgba(255, 255, 255, 0.75); z-index: 1;
			}
			#viewer .slide .image::after {
				content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
				background-image: inherit; background-size: contain !important; 
				background-repeat: no-repeat !important; background-position: center !important; z-index: 2;
			}

			.main-categories { font-size: 1.25em; font-weight: normal; margin: 1em 0; }
			.main-categories a { color: #a0a0a1; border-bottom: none; text-decoration: none; transition: color 0.2s ease; }
			.main-categories a:hover { color: #333; }
			.main-categories span { margin: 0 0.5em; color: #a0a0a1; opacity: 0.5; }
			
			#media-portal {
				display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
				background: #000000; z-index: 50;
			}
			#media-portal iframe {
				position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
				width: 100%; height: 100%; border: none;
			}
			#viewer .inner { z-index: 99999 !important; }
			/* 3. Custom Accordion Arrow Override */
			details > summary {
				list-style: none; /* Hides the default arrow on modern browsers */
			}
			details > summary::-webkit-details-marker {
				display: none; /* Hides the default arrow on older Safari/iOS */
			}
			details > summary::before {
				content: '▸'; /* A clean, geometric text triangle */
				display: inline-block;
				margin-right: 0.5em;
				transition: transform 0.2s ease;
				font-size: 1.1em;
			}
			details[open] > summary::before {
				transform: rotate(90deg); /* Animates the arrow pointing down when clicked */
			}
	/* 4. Category Blurb Logos */
			.blurb-logos {
				margin-top: 2em;
				display: flex;
				gap: 1.5em; /* 🚀 FIX: Reduced gap so they fit on the same line */
				flex-wrap: wrap;
				justify-content: center; 
				align-items: center;
			}
			.blurb-logos img {
				width: 100px;  /* 🚀 FIX: Reduced from 130px to fit the sidebar width */
				height: 40px;  /* 🚀 FIX: Scaled down proportionally */
				object-fit: contain; 
				opacity: 0.5; 
				filter: grayscale(100%);
				transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
				transform-origin: center;
			}			
			.blurb-logos img:hover {
				opacity: 1;
				filter: grayscale(0%);
				transform: scale(1.6); 
				z-index: 10;
				position: relative;
			}
		/* 5. Reviews Carousel */
			#reviews-carousel {
				position: relative; margin: 2em 0; padding: 1.5em; 
				background: rgba(255, 255, 255, 0.03); border-radius: 8px; 
				text-align: right; /* 🚀 Switched to right-aligned */
				display: flex; align-items: center; justify-content: flex-end; /* 🚀 Pushes content right */
				min-height: 160px; 
			}
			.review-slide {
				position: absolute; opacity: 0; transition: opacity 0.8s ease; 
				width: 85%; pointer-events: none;
			}
			.review-slide.active { opacity: 1; pointer-events: auto; z-index: 2; }
			.stars { color: #f5c518; font-size: 1.2em; margin-bottom: 0.8em; }
			.review-text { font-style: italic; color: #a0a0a1; font-size: 0.95em; line-height: 1.6; margin: 0; }
			.review-loc { margin-top: 1em; font-size: 0.75em; color: #666; text-transform: uppercase; letter-spacing: 1px; }
			/* Profile Picture */
/* Profile Picture */
			#profile-pic {
			    width: 110px;  /* 🚀 Increased from 75px */
			    height: 110px; /* 🚀 Increased from 75px */
			    border-radius: 50%; 
			    object-fit: cover; 
			    flex-shrink: 0; 
			}
			/* 6. Sub-Categories Styling */
			.sub-categories { font-size: 1.05em; font-weight: normal; margin: 1em 0; }
			.sub-categories a { color: #a0a0a1; border-bottom: none; text-decoration: none; transition: color 0.2s ease; }
			.sub-categories a:hover { color: #333; }
			.sub-categories span { margin: 0 0.5em; color: #a0a0a1; opacity: 0.5; }

			/* 7. Blurb Logos Carousel (Updated for groups of 3) */
			.blurb-logos {
				position: relative;
				margin-top: 1.5em;
				height: 60px; /* Increased to accommodate larger logos */
				display: flex;
				justify-content: center;
				align-items: center;
			}
			.logo-group {
				position: absolute;
				display: flex;
				justify-content: center;
				align-items: center;
				gap: 2.5em; /* Spacing between the 3 logos */
				opacity: 0;
				transition: opacity 2.0s ease;
				pointer-events: none;
				width: 100%;
			}
			.logo-group.active {
				opacity: 1; 
				pointer-events: auto;
				z-index: 2;
			}
			.blurb-logo {
				width: 130px; /* Increased from 110px */
				height: 55px; /* Increased from 45px */
				object-fit: contain;
				opacity: 0.5;
				filter: grayscale(100%);
				transition: all 0.3s ease;
			}
			.blurb-logo:hover {
				opacity: 1;
				filter: grayscale(0%);
				transform: scale(1.15); 
			}
		</style>
	</head>

<header id="header">

		<script src="data.js"></script>
		<script src="reviews_data.js"></script>

<script>
			const gallery = document.getElementById("thumbnails");

			// 🚀 Modified to accept 'folderOverride' for the mixed overview grid
			function buildGroup(dataArray, defaultFolder, categoryClass) {
				if (!dataArray || dataArray.length === 0) return "";
				let html = "";
				dataArray.forEach(img => {
					// Use specific folder if provided in the object, otherwise use default
					let folder = img.folder ? img.folder : defaultFolder;
					
					// If aspect ratio > 1.2, make it take up 2 grid spots
					let spanClass = (img.aspect && img.aspect > 1.2) ? "span-2" : "";
					
					let ytDataAttr = (img.mediaId && !img.mediaId.startsWith("http")) ? `data-yt="${img.mediaId}"` : "";

					if (img.mediaId && img.mediaId !== "") {
						let icon = img.mediaId.startsWith("http") 
							? `<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>` 
							: `<svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;						
						html += `
						<article class="portfolio-item ${categoryClass} ${spanClass}" ${ytDataAttr} style="display: none;">
							<a class="thumbnail media-trigger" href="images/${folder}/fulls/${img.file}" onclick="setTimeout(() => openMedia('${img.mediaId}'), 50); event.preventDefault();">
								<img src="images/${folder}/thumbs/${img.file}" alt="" loading="lazy" />
								<div class="play-button">${icon}</div>
							</a>
						</article>`;
					} else {
						html += `
						<article class="portfolio-item ${categoryClass} ${spanClass}" style="display: none;">
							<a class="thumbnail" href="images/${folder}/fulls/${img.file}">
								<img src="images/${folder}/thumbs/${img.file}" alt="" loading="lazy" />
							</a>
						</article>`;
					}
				});
				return html;
			}

			// 🚀 Inject Overview first, then everything else
			gallery.innerHTML = 
				buildGroup((typeof overviewImages !== 'undefined' ? overviewImages : null), '', 'tab-overview') +
				buildGroup((typeof realEstateImages !== 'undefined' ? realEstateImages : null), 'real-estate', 'tab-real-estate') +
				buildGroup((typeof travelImages !== 'undefined' ? travelImages : null), 'travel', 'tab-travel') +
				buildGroup((typeof theatreImages !== 'undefined' ? theatreImages : null), 'theatre', 'tab-theatre') +
				buildGroup((typeof videoTravelImages !== 'undefined' ? videoTravelImages : null), 'video-travel', 'tab-video-travel') +
				buildGroup((typeof videoMusicImages !== 'undefined' ? videoMusicImages : null), 'video-music', 'tab-video-music') +
				buildGroup((typeof videoShortsImages !== 'undefined' ? videoShortsImages : null), 'video-shorts', 'tab-video-shorts') +
				buildGroup((typeof videoTheatreImages !== 'undefined' ? videoTheatreImages : null), 'video-theatre', 'tab-video-theatre') +
				buildGroup((typeof webBrandingImages !== 'undefined' ? webBrandingImages : null), 'web-branding', 'tab-web-branding') +
				buildGroup((typeof floorPlansImages !== 'undefined' ? floorPlansImages : null), 'floor-plans', 'tab-floor-plans') +
				buildGroup((typeof _3dToursImages !== 'undefined' ? _3dToursImages : null), '3d-tours', 'tab-3d-tours');

			// Add Overview link to main navigation dynamically
			const mainNav = document.querySelector('.main-categories');
			if(mainNav) {
				mainNav.innerHTML = `<a href="#" id="link-nav-overview" onclick="switchMain(event, 'nav-overview', 'tab-overview')" style="font-weight: bold; text-decoration: underline; color: #333;">Overview</a> <span>/</span> ` + mainNav.innerHTML;
			}

			// Create dummy sub-nav for Overview so it works with your switch logic
			const header = document.getElementById('header');
			if(header) {
				header.insertAdjacentHTML('beforeend', `<nav id="nav-overview" class="sub-nav sub-categories" style="display: block;"></nav>`);
			}

			let batcaveInterval = null;

			// 🚀 The Batcave YouTube Roulette
			function startBatcaveRoulette() {
				if(batcaveInterval) clearInterval(batcaveInterval);
				
				batcaveInterval = setInterval(() => {
					// Clean up previous playing videos
					document.querySelectorAll('.batcave-feed.playing').forEach(iframe => {
						iframe.classList.remove('playing');
						setTimeout(() => iframe.remove(), 1500); // Wait for fade out, then destroy to save RAM
					});

					// Find all visible YouTube spots in the current tab
					const availableSpots = Array.from(document.querySelectorAll('.portfolio-item[data-yt]')).filter(el => el.style.display === 'block');
					
					if (availableSpots.length > 0) {
						// Pick 1 random spot (increase to 2 if you want chaos)
						const targetSpot = availableSpots[Math.floor(Math.random() * availableSpots.length)];
						const ytId = targetSpot.getAttribute('data-yt');
						const linkWrap = targetSpot.querySelector('a');

						// Inject iframe (muted, looping, no controls)
						const iframeHtml = `<iframe class="batcave-feed" src="https://www.youtube.com/embed/${ytId}?autoplay=1&mute=1&controls=0&showinfo=0&modestbranding=1&loop=1&playlist=${ytId}" allow="autoplay" frameborder="0"></iframe>`;
						linkWrap.insertAdjacentHTML('afterbegin', iframeHtml);
						
						// Trigger fade in after a tiny delay to let YT connect
						setTimeout(() => {
							const newIframe = linkWrap.querySelector('.batcave-feed');
							if(newIframe) newIframe.classList.add('playing');
						}, 500);
					}
				}, 7000); // 🚀 Swaps every 7 seconds
			}

			function stopBatcaveRoulette() {
				if(batcaveInterval) clearInterval(batcaveInterval);
				document.querySelectorAll('.batcave-feed').forEach(iframe => iframe.remove());
			}

			// 🚀 ENGINE: Text Box Injector
			let logoCarouselInterval = null;
			let reviewCarouselInterval = null;

			function updateDescription(tabClass, targetEl) {
				const descBox = document.getElementById('category-desc');
				let html = "";
				
				// 1. Inject Text
				if (typeof categoryDescriptions !== 'undefined' && categoryDescriptions[tabClass]) {
					let fullText = categoryDescriptions[tabClass];
					let splitIndex = fullText.indexOf('<br><br>');
					
					if (splitIndex !== -1) {
						let firstPart = fullText.substring(0, splitIndex);
						let restPart = fullText.substring(splitIndex + 8); 
						html += `<p style="margin: 0; color: #888;">${firstPart}</p>`;
						html += `<details style="margin-top: 1em; font-size: 1em; color: #a0a0a1;"><summary style="cursor: pointer; outline: none;">Read More</summary><p style="margin-top: 1em; margin-bottom: 0; line-height: 1.6; color: #888;">${restPart}</p></details>`;
					} else {
						html += `<p style="margin: 0; color: #888;">${fullText}</p>`;
					}
				}

				// 2. Inject Reviews
				if (tabClass === 'tab-real-estate' && typeof clientReviews !== 'undefined' && clientReviews.length > 0) {
					const starSvg = `<svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" style="vertical-align: middle; margin: 0 2px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
					const fiveStars = starSvg.repeat(5);
					html += `<div id="reviews-carousel">`;
					clientReviews.forEach((review, index) => {
						html += `<div class="review-slide ${index === 0 ? "active" : ""}">
							<p class="review-text">"${review.text}"</p>
							<div class="stars" style="margin: 0.8em 0 0.5em 0;">${fiveStars}</div>
							<p class="review-loc">— Vendor, ${review.location}</p>
						</div>`;
					});
					html += `</div>`;
				}
				
				// 3. Inject Logos
				if (typeof categoryLogos !== 'undefined' && categoryLogos[tabClass] && categoryLogos[tabClass].length > 0) {
					const logos = categoryLogos[tabClass];
					html += '<div class="blurb-logos">';
					for (let i = 0; i < logos.length; i += 3) {
						const chunk = logos.slice(i, i + 3);
						html += `<div class="logo-group ${i === 0 ? "active" : ""}">`;
						chunk.forEach(logoSrc => html += `<img src="${logoSrc}" class="blurb-logo" alt="Client Logo" />`);
						html += `</div>`;
					}
					html += '</div>';
				}
				
				if (html !== "") {
					descBox.innerHTML = html;
					descBox.style.display = 'block';
					if (targetEl && targetEl.parentNode) targetEl.parentNode.appendChild(descBox);
					
					if (logoCarouselInterval) clearInterval(logoCarouselInterval);
					if (reviewCarouselInterval) clearInterval(reviewCarouselInterval);

					let logoGroups = descBox.querySelectorAll('.logo-group');
					if (logoGroups.length > 1) {
						let currentGroupIdx = 0;
						logoCarouselInterval = setInterval(() => {
							logoGroups[currentGroupIdx].classList.remove('active');
							currentGroupIdx = (currentGroupIdx + 1) % logoGroups.length;
							logoGroups[currentGroupIdx].classList.add('active');
						}, 10000); 
					}

					let reviewSlides = descBox.querySelectorAll('.review-slide');
					if (reviewSlides.length > 1) {
						let currentReviewIdx = 0;
						reviewCarouselInterval = setInterval(() => {
							reviewSlides[currentReviewIdx].classList.remove('active');
							currentReviewIdx = (currentReviewIdx + 1) % reviewSlides.length;
							reviewSlides[currentReviewIdx].classList.add('active');
						}, 30000); 
					}
				} else {
					descBox.style.display = 'none';
				}
			}

			function switchMain(e, navId, defaultTabClass) {
				if(e) e.preventDefault();
				const viewerClose = document.querySelector('#viewer .close');
				if (viewerClose) viewerClose.click();closeMedia();

				document.querySelectorAll('.main-categories a').forEach(a => {
					a.style.fontWeight = 'normal'; a.style.textDecoration = 'none'; a.style.color = '#a0a0a1'; 
				});
				const activeLink = document.getElementById('link-' + navId);
				if (activeLink) {
					activeLink.style.fontWeight = 'bold'; activeLink.style.textDecoration = 'underline'; activeLink.style.color = '#333'; 
				}

				document.querySelectorAll('.sub-nav').forEach(nav => nav.style.display = 'none');
				const activeNav = document.getElementById(navId);
				
				if (activeNav) {
					activeNav.style.display = 'block';
					const firstSubLink = activeNav.querySelector('a');
					// If there's a sub-link, trigger it. Otherwise, just load the default tab (Overview needs this)
					if (firstSubLink) {
						switchTab(null, defaultTabClass, firstSubLink);
					} else {
						switchTab(null, defaultTabClass, null);
					}
				}
			}

			function switchTab(e, tabClass, linkEl) {
				if(e) e.preventDefault(); 
				const viewerClose = document.querySelector('#viewer .close');
				if (viewerClose) viewerClose.click();closeMedia();

				if (linkEl) {
					const parentNav = linkEl.closest('.sub-nav');
					if (parentNav) {
						parentNav.querySelectorAll('a').forEach(a => {
							a.style.fontWeight = 'normal'; a.style.textDecoration = 'none'; a.style.color = '#a0a0a1';
						});
					}
					linkEl.style.fontWeight = 'bold'; linkEl.style.textDecoration = 'underline'; linkEl.style.color = '#333';
				}

				// If Overview, use the "About" blurb
				if(tabClass === 'tab-overview') {
					updateDescription('tab-about', document.getElementById('nav-overview'));
				} else {
					updateDescription(tabClass, linkEl);
				}
				
				gallery.style.opacity = 0;
				stopBatcaveRoulette(); // Stop videos while transitioning

				setTimeout(() => {
					// Hide everything, then show only the active tab's items
					document.querySelectorAll('.portfolio-item').forEach(item => item.style.display = 'none');
					document.querySelectorAll('.' + tabClass).forEach(item => item.style.display = 'block');
					
					// 🚀 Apply the grid ONLY if it's the Overview tab
					if (tabClass === 'tab-overview') {
						gallery.classList.add('batcave-grid');
						startBatcaveRoulette(); // Start the live videos
						// We explicitly DO NOT auto-click the first image here so the grid is visible!
					} else {
						// 🚀 For all normal tabs, remove the grid and restore normal template behavior
						gallery.classList.remove('batcave-grid');
						
						// Auto-click the first image to open the cinematic viewer (Desktop only)
						if (window.innerWidth > 980) {
							const firstImg = document.querySelector('.' + tabClass + ' .thumbnail');
							if (firstImg) firstImg.click();
						}
					}

					gallery.style.opacity = 1;
				}, 300);
			}

			document.addEventListener("DOMContentLoaded", function() {
				// Auto-load the Overview tab on page start
				switchMain(null, 'nav-overview', 'tab-overview');
			});

			function openMedia(mediaId) {
				if (mediaId.includes("rayon.design")) {
					window.open(mediaId, '_blank');
					return; 
				}

				const viewer = document.getElementById('viewer');
				const portal = document.getElementById('media-portal');
				if (viewer && portal) viewer.appendChild(portal);
				
				const player = document.getElementById('media-player');
				
				if (mediaId.startsWith("http")) {
					player.src = mediaId; 
				} else {
					// Main cinematic player - autoplay but WITH sound and controls
					player.src = "https://www.youtube.com/embed/" + mediaId + "?autoplay=1&rel=0&showinfo=0&modestbranding=1";
				}
				
				portal.style.display = 'block';
			}

			function closeMedia() {
				const portal = document.getElementById('media-portal');
				const player = document.getElementById('media-player');
				if (portal) portal.style.display = 'none';
				if (player) player.src = ""; 
			}

			document.addEventListener('click', function(e) {
				if (e.target.closest('.toggle') || e.target.closest('.nav-next') || e.target.closest('.nav-previous') || (e.target.closest('.thumbnail') && !e.target.closest('.media-trigger'))) {
					closeMedia();
				}
			});

			document.addEventListener('keydown', function(e) {
				if (['Escape', 'ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
					closeMedia();
				}
			});

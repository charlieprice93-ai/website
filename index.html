<!DOCTYPE HTML>
<html>
	<head>
		<title>Charlie Price Creative</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
<style>
			/* 1. Perfect Square Thumbnails */
			#thumbnails article .thumbnail img {
				width: 100% !important;
				height: 100% !important;
				aspect-ratio: 1 / 1 !important;
				object-fit: cover !important; 
			}

			/* 2. The Blurred Cinematic Viewer (Portrait Fix) */
			#viewer .slide {
				/* The parent acts as the massive, stretched background */
				background-size: cover !important;
				background-position: center !important;
				position: relative;
			}

			/* Layer 1: The Frosted Glass overlay */
			#viewer .slide::before {
				content: "";
				position: absolute;
				top: 0; left: 0; width: 100%; height: 100%;
				backdrop-filter: blur(40px);
				-webkit-backdrop-filter: blur(40px); /* Required for Safari support */
				background: rgba(0, 0, 0, 0.65); /* Darkens the blur so the main photo pops */
				z-index: 1;
			}

			/* Layer 2: The Sharp, Un-cropped Image */
			#viewer .slide::after {
				content: "";
				position: absolute;
				top: 0; left: 0; width: 100%; height: 100%;
				background-image: inherit; /* The magic trick: steals the image from the parent */
				background-size: contain !important;
				background-repeat: no-repeat !important;
				background-position: center !important;
				z-index: 2;
			}
		</style>
	</head>
	<body class="is-preload-0 is-preload-1 is-preload-2">
		<div id="main">

			<header id="header">
				<h1>Charlie Price</h1>
				<h3>Photography, Videography & Design</h3>
				<p>Based on the Isle of Wight, UK</p>
				<nav style="margin: 2em 0;">
					<ul style="list-style: none; padding: 0; margin: 0; line-height: 2;">
						<li><a href="index.html" style="font-weight: bold; border-bottom: none;">Real Estate</a></li>
						<li><a href="travel.html" style="border-bottom: none;">Travel & Lifestyle</a></li>
						<li><a href="video.html" style="border-bottom: none;">Videography</a></li>
						<li><a href="theatre.html" style="border-bottom: none;">Film & Theatre</a></li>
					</ul>
				</nav>
				<ul class="icons">
					<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
					<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
				</ul>
			</header>

			<section id="thumbnails"></section>

			<footer id="footer">
				<ul class="copyright">
					<li>&copy; Charlie Price.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a>.</li>
				</ul>
			</footer>

		</div>

		<script src="data.js"></script>

		<script>
			const gallery = document.getElementById("thumbnails");
			let galleryHTML = "";

			if (typeof realEstateImages !== 'undefined' && gallery) {
				realEstateImages.forEach(img => {
					galleryHTML += `
					<article>
						<a class="thumbnail" href="images/real-estate/fulls/${img.file}">
							<img src="images/real-estate/thumbs/${img.file}" alt="${img.title}" loading="lazy" />
						</a>
						<h2>${img.title}</h2>
						<p></p>
					</article>
					`;
				});
				gallery.innerHTML = galleryHTML;
			}
		</script>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>

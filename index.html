<!DOCTYPE HTML>
<html>
	<head>
		<title>Charlie Price Creative</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

		<style>
			/* 1. Flawless Square CSS Grid & Smooth Cross-Fade Animation */
			#thumbnails {
				display: grid !important;
				grid-template-columns: repeat(2, 1fr) !important; /* Forces exactly 2 columns */
				gap: 0 !important;
				transition: opacity 0.3s ease-in-out !important;
				opacity: 1;
			}
			#thumbnails article {
				width: 100% !important;
				height: auto !important;
				position: relative !important;
				top: 0 !important;
				left: 0 !important;
				transform: none !important;
			}
			#thumbnails article .thumbnail {
				width: 100% !important;
				aspect-ratio: 1 / 1 !important;
				display: block;
			}
			#thumbnails article .thumbnail img {
				width: 100% !important;
				height: 100% !important;
				object-fit: cover !important; 
			}

			/* 2. The Blurred Cinematic Viewer (Targeting the inner .image div) */
			#viewer .slide .image {
				background-size: cover !important;
				background-position: center !important;
				position: relative;
			}
			/* Layer 1: The Frosted Glass */
			#viewer .slide .image::before {
				content: "";
				position: absolute;
				top: 0; left: 0; width: 100%; height: 100%;
				backdrop-filter: blur(40px);
				-webkit-backdrop-filter: blur(40px); 
				background: rgba(0, 0, 0, 0.65); 
				z-index: 1;
			}
			/* Layer 2: The Sharp, Height-Capped Image */
			#viewer .slide .image::after {
				content: "";
				position: absolute;
				top: 0; left: 0; width: 100%; height: 100%;
				background-image: inherit; /* Steals the specific photo URL from the inner div */
				background-size: contain !important; /* THIS forces it to fit within the screen height! */
				background-repeat: no-repeat !important;
				background-position: center !important;
				z-index: 2;
			}
		</style>
	</head>
	<body class="is-preload-0 is-preload-1 is-preload-2">
		<div id="main">

			<header id="header">
				<h1>Charlie Price</h1>
				<h3>Photography, Videography & Design</h3>
				<p>Based on the Isle of Wight, UK</p>
				<nav style="margin: 2em 0;">
					<ul style="list-style: none; padding: 0; margin: 0; line-height: 2;">
						<li><a href="#" onclick="switchTab(event, 'tab-real-estate', this)" style="font-weight: bold; border-bottom: none;">Real Estate</a></li>
						<li><a href="#" onclick="switchTab(event, 'tab-travel', this)" style="border-bottom: none;">Travel & Lifestyle</a></li>
						<li><a href="#" onclick="switchTab(event, 'tab-video', this)" style="border-bottom: none;">Videography</a></li>
						<li><a href="#" onclick="switchTab(event, 'tab-theatre', this)" style="border-bottom: none;">Film & Theatre</a></li>
					</ul>
				</nav>
				<ul class="icons">
					<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
					<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
				</ul>
			</header>

			<section id="thumbnails"></section>

			<footer id="footer">
				<ul class="copyright">
					<li>&copy; Charlie Price.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a>.</li>
				</ul>
			</footer>

		</div>

		<script src="data.js"></script>

		<script>
			const gallery = document.getElementById("thumbnails");

			// We assign a class to each article so the template viewer can find them seamlessly
			function buildGroup(dataArray, folder, categoryClass) {
				if (typeof dataArray === 'undefined') return "";
				let html = "";
				dataArray.forEach(img => {
					// Give them the category class, and hide them by default
					html += `
					<article class="portfolio-item ${categoryClass}" style="display: none;">
						<a class="thumbnail" href="images/${folder}/fulls/${img.file}">
							<img src="images/${folder}/thumbs/${img.file}" alt="" loading="lazy" />
						</a>
						<h2></h2><p></p>
					</article>`;
				});
				return html;
			}

			// Instantly load ALL categories into the hidden DOM
			gallery.innerHTML = 
				buildGroup(realEstateImages, 'real-estate', 'tab-real-estate') +
				buildGroup(travelImages, 'travel', 'tab-travel') +
				buildGroup(videoImages, 'video', 'tab-video') +
				buildGroup(theatreImages, 'theatre', 'tab-theatre');

			// Turn on the Real Estate tab by default on first load
			document.querySelectorAll('.tab-real-estate').forEach(item => item.style.display = 'block');

			// The Seamless Transition Engine
			function switchTab(e, tabClass, linkEl) {
				if(e) e.preventDefault(); // Stops the page jumping to the top

				// 1. Swap the bold text on the menu
				document.querySelectorAll('nav a').forEach(a => a.style.fontWeight = 'normal');
				linkEl.style.fontWeight = 'bold';

				// 2. Fade the grid to black
				gallery.style.opacity = 0;

				// 3. Wait 300ms, swap the photos, and fade back in
				setTimeout(() => {
					// Hide all photos
					document.querySelectorAll('.portfolio-item').forEach(item => {
						item.style.display = 'none';
					});
					
					// Turn on the chosen category
					document.querySelectorAll('.' + tabClass).forEach(item => {
						item.style.display = 'block';
					});
					
					// Fade back in
					gallery.style.opacity = 1;
				}, 300);
			}
		</script>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>

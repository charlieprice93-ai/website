			#thumbnails {

			#thumbnails article .thumbnail,

			.play-button {

			.media-trigger:hover .play-button { opacity: 1; }

	/* 2. The Blurred Cinematic Viewer (For Photos) */
			#viewer .slide .image {
				background-size: cover !important;
				background-position: center !important;
				position: relative;
			}
			#viewer .slide .image::before {
				content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
				backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); 
				/* 🚀 THE FIX: Changed from black (0,0,0) to white (255,255,255) */
				background: rgba(255, 255, 255, 0.75); z-index: 1;
			}
			#viewer .slide .image::after {
				content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
				background-image: inherit; background-size: contain !important; 
				background-repeat: no-repeat !important; background-position: center !important; z-index: 2;
			}

			.main-categories { font-size: 1.25em; font-weight: normal; margin: 1em 0; }
			.main-categories a { color: #a0a0a1; border-bottom: none; text-decoration: none; transition: color 0.2s ease; }
			.main-categories a:hover { color: #333; }
			.main-categories span { margin: 0 0.5em; color: #a0a0a1; opacity: 0.5; }
			
			#media-portal {
				display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
				background: #000000; z-index: 50;
			}
			#media-portal iframe {
				position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
				width: 100%; height: 100%; border: none;
			}
			#viewer .inner { z-index: 99999 !important; }
			/* 3. Custom Accordion Arrow Override */
			details > summary {
				list-style: none; /* Hides the default arrow on modern browsers */
			}
			details > summary::-webkit-details-marker {
				display: none; /* Hides the default arrow on older Safari/iOS */
			}
			details > summary::before {
				content: '▸'; /* A clean, geometric text triangle */
				display: inline-block;
				margin-right: 0.5em;
				transition: transform 0.2s ease;
				font-size: 1.1em;
			}
			details[open] > summary::before {
				transform: rotate(90deg); /* Animates the arrow pointing down when clicked */
			}
	/* 4. Category Blurb Logos */
			.blurb-logos {
				margin-top: 2em;
				display: flex;
				gap: 1.5em; /* 🚀 FIX: Reduced gap so they fit on the same line */
				flex-wrap: wrap;
				justify-content: center; 
				align-items: center;
			}
			.blurb-logos img {
				width: 100px;  /* 🚀 FIX: Reduced from 130px to fit the sidebar width */
				height: 40px;  /* 🚀 FIX: Scaled down proportionally */
				object-fit: contain; 
				opacity: 0.5; 
				filter: grayscale(100%);
				transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
				transform-origin: center;
			}			
			.blurb-logos img:hover {
				opacity: 1;
				filter: grayscale(0%);
				transform: scale(1.6); 
				z-index: 10;
				position: relative;
			}
		/* 5. Reviews Carousel */
			#reviews-carousel {
				position: relative; margin: 2em 0; padding: 1.5em; 
				background: rgba(255, 255, 255, 0.03); border-radius: 8px; 
				text-align: right; /* 🚀 Switched to right-aligned */
				display: flex; align-items: center; justify-content: flex-end; /* 🚀 Pushes content right */

			}
			.review-slide {
				position: absolute; opacity: 0; transition: opacity 0.8s ease; 
				width: 85%; pointer-events: none;
			}
			.review-slide.active { opacity: 1; pointer-events: auto; z-index: 2; }
			.stars { color: #f5c518; font-size: 1.2em; margin-bottom: 0.8em; }
			.review-text { font-style: italic; color: #a0a0a1; font-size: 0.95em; line-height: 1.6; margin: 0; }
			.review-loc { margin-top: 1em; font-size: 0.75em; color: #666; text-transform: uppercase; letter-spacing: 1px; }
			/* Profile Picture */
/* Profile Picture */
			#profile-pic {
			    width: 110px;  /* 🚀 Increased from 75px */
			    height: 110px; /* 🚀 Increased from 75px */
			    border-radius: 50%; 
			    object-fit: cover; 
			    flex-shrink: 0; 
			}
			/* 6. Sub-Categories Styling */
			.sub-categories { font-size: 1.05em; font-weight: normal; margin: 1em 0; }
			.sub-categories a { color: #a0a0a1; border-bottom: none; text-decoration: none; transition: color 0.2s ease; }
			.sub-categories a:hover { color: #333; }
			.sub-categories span { margin: 0 0.5em; color: #a0a0a1; opacity: 0.5; }

			/* 7. Blurb Logos Carousel (Updated for groups of 3) */
			.blurb-logos {
				position: relative;
				margin-top: 1.5em;
				height: 60px; /* Increased to accommodate larger logos */
				display: flex;
				justify-content: center;
				align-items: center;
			}
			.logo-group {
				position: absolute;
				display: flex;
				justify-content: center;
				align-items: center;
				gap: 2.5em; /* Spacing between the 3 logos */
				opacity: 0;
				transition: opacity 2.0s ease;
				pointer-events: none;
				width: 100%;
			}
			.logo-group.active {
				opacity: 1; 
				pointer-events: auto;
				z-index: 2;
			}
			.blurb-logo {
				width: 130px; /* Increased from 110px */
				height: 55px; /* Increased from 45px */
				object-fit: contain;
				opacity: 0.5;
				filter: grayscale(100%);
				transition: all 0.3s ease;
			}
			.blurb-logo:hover {
				opacity: 1;
				filter: grayscale(0%);
				transform: scale(1.15); 
			}
			/* 🚀 HOME PAGE MASONRY GRID (FLOATING IN VIEWER) */
#home-masonry-grid {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 85%; /* Creates the floating 'picture frame' look */
    max-height: 85vh;
    z-index: 45; /* Sits safely above the background image */
    
    /* The Magic Masonry Formula */
    column-count: 4;
    column-gap: 15px;
    
    overflow-y: auto;
    overflow-x: hidden;
    transition: opacity 0.8s ease, visibility 0.8s ease;
    
    /* Hide the scrollbar for a cleaner floating look, but keep functionality */
    scrollbar-width: none; 
}

#home-masonry-grid::-webkit-scrollbar { 
    display: none; 
}

#home-masonry-grid.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

/* Individual Masonry Items */
.home-grid-item {
    width: 100%;
    height: auto; /* Natural aspect ratio creates the puzzle/masonry effect! */
    margin-bottom: 15px;
    display: block;
    opacity: 1;
    border-radius: 4px; /* Optional: adds a tiny, polished curve to the images */
    transition: opacity 1.5s ease-in-out, transform 0.3s ease;
    cursor: pointer;
}

.home-grid-item:hover {
    transform: scale(1.02); /* Slight pop on hover */
}

/* State for the twinkle rotation */
.home-grid-item.fade-out {
    opacity: 0;
}

/* Responsive Grid formatting for smaller screens */
@media screen and (max-width: 1280px) {
    #home-masonry-grid { column-count: 3; width: 90%; }
}
@media screen and (max-width: 980px) {
    #home-masonry-grid { column-count: 2; width: 95%; max-height: 90vh; }
}
@media screen and (max-width: 736px) {
    #home-masonry-grid { column-count: 1; width: 100%; max-height: 100vh; border-radius: 0; }
}

		<script>
			const gallery = document.getElementById("thumbnails");

			function buildGroup(dataArray, folder, categoryClass) {
				if (!dataArray || dataArray.length === 0) return "";
				let html = "";
				dataArray.forEach(img => {
					if (img.mediaId && img.mediaId !== "") {
// 🚀 FIX: Replaced hijackable text characters with bulletproof SVGs
						let icon = img.mediaId.startsWith("http") 
							? `<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>` 
							: `<svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;						html += `
						<article class="portfolio-item ${categoryClass}" style="display: none;">
							<a class="thumbnail media-trigger" href="images/${folder}/fulls/${img.file}" onclick="setTimeout(() => openMedia('${img.mediaId}'), 50);">
								<img src="images/${folder}/thumbs/${img.file}" alt="" loading="lazy" />
								<div class="play-button">${icon}</div>
							</a>
							<h2></h2><p></p>
						</article>`;
					} else {
						html += `
						<article class="portfolio-item ${categoryClass}" style="display: none;">
							<a class="thumbnail" href="images/${folder}/fulls/${img.file}">
								<img src="images/${folder}/thumbs/${img.file}" alt="" loading="lazy" />
							</a>
							<h2></h2><p></p>
						</article>`;
					}
				});
				return html;
			}

			gallery.innerHTML = 
				buildGroup((typeof realEstateImages !== 'undefined' ? realEstateImages : null), 'real-estate', 'tab-real-estate') +
				buildGroup((typeof travelImages !== 'undefined' ? travelImages : null), 'travel', 'tab-travel') +
				buildGroup((typeof theatreImages !== 'undefined' ? theatreImages : null), 'theatre', 'tab-theatre') +
				buildGroup((typeof videoTravelImages !== 'undefined' ? videoTravelImages : null), 'video-travel', 'tab-video-travel') +
				buildGroup((typeof videoMusicImages !== 'undefined' ? videoMusicImages : null), 'video-music', 'tab-video-music') +
				buildGroup((typeof videoShortsImages !== 'undefined' ? videoShortsImages : null), 'video-shorts', 'tab-video-shorts') +
				buildGroup((typeof videoTheatreImages !== 'undefined' ? videoTheatreImages : null), 'video-theatre', 'tab-video-theatre') +
				buildGroup((typeof webBrandingImages !== 'undefined' ? webBrandingImages : null), 'web-branding', 'tab-web-branding') +
				buildGroup((typeof floorPlansImages !== 'undefined' ? floorPlansImages : null), 'floor-plans', 'tab-floor-plans') +
				buildGroup((typeof _3dToursImages !== 'undefined' ? _3dToursImages : null), '3d-tours', 'tab-3d-tours');

			document.querySelectorAll('.tab-real-estate').forEach(item => item.style.display = 'block');
// 🚀 INJECT THE ABOUT SECTION WITH SMART SPLIT
			if (typeof categoryDescriptions !== 'undefined' && categoryDescriptions['tab-about']) {
				let fullText = categoryDescriptions['tab-about'];
				let splitIndex = fullText.indexOf('<br><br>');
				let html = "";
				
				if (splitIndex !== -1) {
					let firstPart = fullText.substring(0, splitIndex);
					let restPart = fullText.substring(splitIndex + 8); 
					
					html += `<p style="margin: 0; color: #888;">${firstPart}</p>`;
					html += `
					<details style="margin-top: 1em; font-size: 1em; color: #a0a0a1;">
						<summary style="cursor: pointer; outline: none; transition: color 0.2s ease;">Read More</summary>
						<p style="margin-top: 1em; margin-bottom: 0; line-height: 1.6; color: #888;">${restPart}</p>
					</details>`;
				} else {
					html += `<p style="margin: 0; color: #888;">${fullText}</p>`;
				}
				
				document.getElementById('about-container').innerHTML = html;
			}
			
// 🚀 ENGINE: Text Box Injector
	// 🚀 GLOBAL VARIABLES for the carousels
			let logoCarouselInterval = null;
			let reviewCarouselInterval = null;

			// 🚀 ENGINE: Text Box, Reviews & Logo Injector
			function updateDescription(tabClass, targetEl) {
				const descBox = document.getElementById('category-desc');
				let html = "";
				
				// 1. Inject Text with Smart Split
				if (typeof categoryDescriptions !== 'undefined' && categoryDescriptions[tabClass]) {
					let fullText = categoryDescriptions[tabClass];
					let splitIndex = fullText.indexOf('<br><br>');
					
					if (splitIndex !== -1) {
						let firstPart = fullText.substring(0, splitIndex);
						let restPart = fullText.substring(splitIndex + 8); 
						
						html += `<p style="margin: 0; color: #888;">${firstPart}</p>`;
						html += `
						<details style="margin-top: 1em; font-size: 1em; color: #a0a0a1;">
							<summary style="cursor: pointer; outline: none; transition: color 0.2s ease;">Read More</summary>
							<p style="margin-top: 1em; margin-bottom: 0; line-height: 1.6; color: #888;">${restPart}</p>
						</details>`;
					} else {
						html += `<p style="margin: 0; color: #888;">${fullText}</p>`;
					}
				}

				// 🚀 2. Inject Reviews (ONLY for Real Estate tab)
				if (tabClass === 'tab-real-estate' && typeof clientReviews !== 'undefined' && clientReviews.length > 0) {
					const starSvg = `<svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" style="vertical-align: middle; margin: 0 2px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
					const fiveStars = starSvg.repeat(5);

					// Note: Using your existing CSS classes for #reviews-carousel and .review-slide
					html += `<div id="reviews-carousel">`;
					clientReviews.forEach((review, index) => {
						let activeClass = index === 0 ? "active" : "";
						html += `
						<div class="review-slide ${activeClass}">
							<p class="review-text">"${review.text}"</p>
							<div class="stars" style="margin: 0.8em 0 0.5em 0;">${fiveStars}</div>
							<p class="review-loc">— Vendor, ${review.location}</p>
						</div>`;
					});
					html += `</div>`;
				}
				
				// 3. Inject Logos (Formatted for Carousel in Groups of 3)
				if (typeof categoryLogos !== 'undefined' && categoryLogos[tabClass] && categoryLogos[tabClass].length > 0) {
					const logos = categoryLogos[tabClass];
					html += '<div class="blurb-logos">';
					
					// Chunk logos into arrays of up to 3
					const chunkSize = 3;
					for (let i = 0; i < logos.length; i += chunkSize) {
						const chunk = logos.slice(i, i + chunkSize);
						const activeClass = i === 0 ? "active" : "";
						
						html += `<div class="logo-group ${activeClass}">`;
						chunk.forEach(logoSrc => {
							html += `<img src="${logoSrc}" class="blurb-logo" alt="Client Logo" />`;
						});
						html += `</div>`;
					}
					html += '</div>';
				}
				
				// 4. Show/Hide Box & Initialize Carousels
				if (html !== "") {
					descBox.innerHTML = html;
					descBox.style.display = 'block';

					// Detach and snap right below the active link
					if (targetEl && targetEl.parentNode) {
						targetEl.parentNode.appendChild(descBox);
					}

					// Clear any existing carousel timers
					if (logoCarouselInterval) clearInterval(logoCarouselInterval);
					if (reviewCarouselInterval) clearInterval(reviewCarouselInterval);

					// Start Logo Carousel (10 seconds)
					let logoGroups = descBox.querySelectorAll('.logo-group');
					if (logoGroups.length > 1) {
						let currentGroupIdx = 0;
						logoCarouselInterval = setInterval(() => {
							logoGroups[currentGroupIdx].classList.remove('active');
							currentGroupIdx = (currentGroupIdx + 1) % logoGroups.length;
							logoGroups[currentGroupIdx].classList.add('active');
						}, 10000); 
					}

					// Start Review Carousel (30 seconds)
					let reviewSlides = descBox.querySelectorAll('.review-slide');
					if (reviewSlides.length > 1) {
						let currentReviewIdx = 0;
						reviewCarouselInterval = setInterval(() => {
							reviewSlides[currentReviewIdx].classList.remove('active');
							currentReviewIdx = (currentReviewIdx + 1) % reviewSlides.length;
							reviewSlides[currentReviewIdx].classList.add('active');
						}, 30000); 
					}
				} else {
					descBox.style.display = 'none';
				}
			}

			function switchMain(e, navId, defaultTabClass) {
				if(e) e.preventDefault();
				const viewerClose = document.querySelector('#viewer .close');
				if (viewerClose) viewerClose.click();closeMedia();

				// Reset all Main links
				document.querySelectorAll('.main-categories a').forEach(a => {
					a.style.fontWeight = 'normal'; a.style.textDecoration = 'none'; a.style.color = '#a0a0a1'; 
				});
				const activeLink = document.getElementById('link-' + navId);
				if (activeLink) {
					activeLink.style.fontWeight = 'bold'; activeLink.style.textDecoration = 'underline'; activeLink.style.color = '#333'; 
				}

				// Hide all Sub Navs
				document.querySelectorAll('.sub-nav').forEach(nav => nav.style.display = 'none');
				const activeNav = document.getElementById(navId);
				
				if (activeNav) {
					activeNav.style.display = 'block';
					const firstSubLink = activeNav.querySelector('a');
					// Trigger switchTab on the first element of the new menu
					if (firstSubLink) switchTab(null, defaultTabClass, firstSubLink);
				}
			}

			function switchTab(e, tabClass, linkEl) {
				if(e) e.preventDefault(); 
				const viewerClose = document.querySelector('#viewer .close');
				if (viewerClose) viewerClose.click();closeMedia();

				// 🚀 Update Sub-Nav Styles (Remove underline from siblings, add to active)
				if (linkEl) {
					const parentNav = linkEl.closest('.sub-nav');
					if (parentNav) {
						parentNav.querySelectorAll('a').forEach(a => {
							a.style.fontWeight = 'normal';
							a.style.textDecoration = 'none';
							a.style.color = '#a0a0a1';
						});
					}
					linkEl.style.fontWeight = 'bold';
					linkEl.style.textDecoration = 'underline';
					linkEl.style.color = '#333';
				}

				updateDescription(tabClass, linkEl);
				
				gallery.style.opacity = 0;
				setTimeout(() => {

// 🚀 HOME PAGE ENGINE V2 (Masonry & Floating)
document.addEventListener("DOMContentLoaded", function() {
    
    // 1. Create the floating masonry grid INSIDE the viewer
    const viewer = document.getElementById('viewer');
    const gridContainer = document.createElement('div');
    gridContainer.id = 'home-masonry-grid';
    viewer.appendChild(gridContainer); 

    // 2. State management
    const displayCount = 16; 
    let displayedImages = homeImages.slice(0, displayCount);
    let reserveImages = homeImages.slice(displayCount);

    // 3. Build the initial grid
    displayedImages.forEach((imgData, index) => {
        let img = document.createElement('img');
        img.src = `images/${imgData.folder}/thumbs/${imgData.file}`; 
        img.className = 'home-grid-item';
        img.dataset.index = index;
        
        img.onclick = () => routeToMedia(displayedImages[index]);
        gridContainer.appendChild(img);
    });

    // 4. The Twinkle Effect 
    setInterval(() => {
        if (reserveImages.length === 0 || gridContainer.classList.contains('hidden')) return;

        let cellIndex = Math.floor(Math.random() * displayCount);
        let imgElement = gridContainer.children[cellIndex];
        
        imgElement.classList.add('fade-out');
        
        setTimeout(() => {
            let oldData = displayedImages[cellIndex];
            let newData = reserveImages.shift();
            reserveImages.push(oldData); 
            displayedImages[cellIndex] = newData; 
            
            imgElement.src = `images/${newData.folder}/thumbs/${newData.file}`;
            imgElement.onclick = () => routeToMedia(newData);
            
            imgElement.classList.remove('fade-out');
        }, 1500); 
    }, 3000); 

    // 5. The Routing Function (Ghost Click)
    function routeToMedia(imgData) {
        gridContainer.classList.add('hidden'); 

        const tabLink = document.querySelector(`a[onclick*="${imgData.originTab}"]`);
        if (tabLink) {
            const parentNav = tabLink.closest('nav');
            if (parentNav) {
                const mainLink = document.getElementById('link-' + parentNav.id);
                if (mainLink) mainLink.click();
            }
            tabLink.click();
        }

        setTimeout(() => {
            const thumbnails = document.querySelectorAll(`.${imgData.originTab} .thumbnail img`);
            for (let thumb of thumbnails) {
                if (thumb.src.includes(imgData.file)) {
                    thumb.parentElement.click(); 
                    break;
                }
            }
        }, 350); 
    }

    // 6. Sidebar Interceptor: Hide the grid when ANY sidebar link is clicked
    const sidebarLinks = document.querySelectorAll('#header a[onclick*="switchMain"], #header a[onclick*="switchTab"]');
    sidebarLinks.forEach(link => {
        link.addEventListener('click', () => {
            gridContainer.classList.add('hidden');
        });
    });

    // 7. Master Reset Function (The "Clean State")
    function resetToHome() {
        // Fade grid in
        gridContainer.classList.remove('hidden');
        
        // Ensure any fullscreen media is closed
        closeMedia();
        const viewerClose = document.querySelector('#viewer .close');
        if (viewerClose) viewerClose.click();

        // Strip bold/underline styles from all links
        document.querySelectorAll('.main-categories a, .sub-categories a').forEach(a => {
            a.style.fontWeight = 'normal'; 
            a.style.textDecoration = 'none'; 
            a.style.color = '#a0a0a1'; 
        });
        
        // Hide sub-navigation and blurbs
        document.querySelectorAll('.sub-nav').forEach(nav => nav.style.display = 'none');
        const descBox = document.getElementById('category-desc');
        if (descBox) descBox.style.display = 'none';

        // Hide the right-hand sidebar thumbnails smoothly
        const gallery = document.getElementById("thumbnails");
        if (gallery) {
            gallery.style.opacity = 0;
            setTimeout(() => {
                document.querySelectorAll('.portfolio-item').forEach(item => item.style.display = 'none');
            }, 300);
        }
    }

    // 8. Hook up the H1 Home Button
    const h1 = document.querySelector('#header h1');
    if (h1) {
        h1.style.cursor = 'pointer';
        h1.title = "Return to Home Grid";
        h1.addEventListener('click', (e) => {
            e.preventDefault();
            resetToHome();
        });
    }

    // 9. Initial Load: Run the reset to ensure a perfect clean state
    setTimeout(() => {
        resetToHome();
    }, 100);

});		</script>
